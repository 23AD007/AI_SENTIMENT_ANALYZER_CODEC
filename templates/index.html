<!DOCTYPE html>
<html>

<head>

    <title>AI Sentiment Analyzer</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="container mt-5">
    <div class="mb-4">

<a href="/" class="btn btn-primary">

Home

</a>

<a href="/history"
class="btn btn-success">

History

</a>

<a href="/dashboard"
class="btn btn-warning">

Dashboard

</a>

</div>

<h2>AI Sentiment Analyzer</h2>

<textarea
id="review"
class="form-control"
rows="6"
placeholder="Enter your review"></textarea>

<br>

<button
class="btn btn-primary"
onclick="analyze()">
Analyze
</button>

<h3 class="mt-4" id="result"></h3>
<hr>

<h3>Upload CSV</h3>

<form
action="/upload"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="file"
class="form-control">

<br>

<button
class="btn btn-success">

Upload CSV

</button>

</form>
<script>

function analyze(){

    fetch("/predict",{

        method:"POST",

        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },

        body:"text="+encodeURIComponent(
            document.getElementById("review").value
        )

    })

    .then(res=>res.json())

    .then(data=>{

        document.getElementById("result").innerHTML=

        "Sentiment : <b>"+data.sentiment+"</b><br><br>Confidence : "+data.score+"%";

    });

}

</script>

</body>
</html>
