<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Sentiment Dashboard</h2>

<div class="row">

<div class="col-md-4">

<div class="card">

<div class="card-body">

<h3>{{total}}</h3>

<p>Total Reviews</p>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-success text-white">

<div class="card-body">

<h3>{{positive}}</h3>

<p>Positive</p>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card bg-danger text-white">

<div class="card-body">

<h3>{{negative}}</h3>

<p>Negative</p>

</div>

</div>

</div>

</div>

<hr>

<canvas
id="pieChart"
height="120">
</canvas>
<hr>

<h3>Latest Reviews</h3>

<table class="table table-striped">

<tr>

<th>Review</th>

<th>Sentiment</th>

</tr>

{% for r in recent %}

<tr>

<td>{{r.text}}</td>

<td>{{r.sentiment}}</td>

</tr>

{% endfor %}

</table>
<script>

const ctx = document.getElementById("pieChart");

new Chart(ctx, {

    type: "pie",

    data: {

        labels: [
            "Positive",
            "Neutral",
            "Negative"
        ],

        datasets: [{

            data: [
                {{positive}},
                {{neutral}},
                {{negative}}
            ]

        }]

    }

});
<canvas id="barChart"></canvas>



</script>
<script>

new Chart(
document.getElementById("barChart"),

{

type:"bar",

data:{

labels:["Positive","Neutral","Negative"],

datasets:[{

label:"Reviews",

data:[
{{positive}},
{{neutral}},
{{negative}}
]

}]

}

});

</script>
</body>

</html>
