version: '3.9'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_DEBUG: '1'
      FLASK_RUN_HOST: '0.0.0.0'
      MONGO_URI: 'mongodb://mongo:27017'
      DATABASE_NAME: 'sentiment_db'
      SECRET_KEY: 'change_me'
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    depends_on:
      - mongo

  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
